<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convert Money</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="illustration">💸</div>

    <div class="card">
      <label for="moeda-de">Converter de</label>
      <select id="moeda-de">
        <option value="BRL">R$ Real brasileiro</option>
        <option value="USD">US$ Dólar americano</option>
        <option value="EUR">€ Euro</option>
        <option value="GBP">£ Libra esterlina</option>
      </select>

      <label for="moeda-para">Converter para</label>
      <select id="moeda-para">
        <option value="USD">US$ Dólar americano</option>
        <option value="BRL">R$ Real brasileiro</option>
        <option value="EUR">€ Euro</option>
        <option value="GBP">£ Libra esterlina</option>
      </select>

      <label for="valor">Valor</label>
      <input type="number" id="valor" placeholder="R$ 10.000,00" value="10000">

      <button id="btn-converter">Converter</button>
    </div>

    <div class="resultado" id="resultado" hidden>
      <div class="resultado-linha">
        <span class="flag" id="flag-de"></span>
        <span id="valor-de"></span>
      </div>
      <span class="seta">↓</span>
      <div class="resultado-linha">
        <span class="flag" id="flag-para"></span>
        <span id="valor-para"></span>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

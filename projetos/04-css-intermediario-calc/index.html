<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CSS calc()</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Layout de 3 colunas com calc()</h1>
  <div class="row">
    <div class="col">Coluna 1</div>
    <div class="col">Coluna 2</div>
    <div class="col">Coluna 3</div>
  </div>

  <h2>Sidebar fixa + conteúdo fluido (calc())</h2>
  <div class="layout">
    <aside class="sidebar">Sidebar 240px</aside>
    <main class="content">Conteúdo: width: calc(100% - 240px)</main>
  </div>
</body>
</html>

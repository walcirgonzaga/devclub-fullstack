<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Desafio — Position</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Desafio: Cards de produto com badge posicionado</h1>
  <div class="cards">
    <div class="card">
      <span class="badge">Novo</span>
      <div class="card-img"></div>
      <h3>Tênis Runner</h3>
      <p>R$ 249,90</p>
    </div>
    <div class="card">
      <span class="badge badge-sale">-20%</span>
      <div class="card-img"></div>
      <h3>Jaqueta Jeans</h3>
      <p>R$ 179,90</p>
    </div>
    <div class="card">
      <div class="card-img"></div>
      <h3>Boné Clássico</h3>
      <p>R$ 59,90</p>
    </div>
  </div>
</body>
</html>
